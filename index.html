function buildPool() {

const AVATARS = ["🦊", "🐼", "🦋", "🐬", "🦄", "🐝", "🐸", "🦁", "🐧", "🐨"];

async function createUser(name) {
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-");

  const data = {
    name,
    avatar,
    createdAt: new Date().toISOString(),
    totalQuizzes: 0,
    totalQuestions: 0,
    totalCorrect: 0
  };

    id,
    ...data
  };
}

    timestamp: new Date().toISOString()

  const s = await getUserStats(uid);
  if (s) await dbUpdate(`users/${uid}`, {
    totalQuizzes: (s.totalQuizzes || 0) + 1,
    totalQuestions: (s.totalQuestions || 0) + qd.total,
    totalCorrect: (s.totalCorrect || 0) + qd.correct

}

    id,
    ...v

      before: 0,
      after: 0

    byType: {
      standard: 0,
      reversed: 0
    },
    byFormat: {},
    byRange: {
      easy: 0,
      medium: 0,
      hard: 0
    },
    recentErrors: errors.slice(0, 30),
    formatRanking: []

  for (const e of errors) {
    if (e.direction) p.byDirection[e.direction]++;
    if (e.questionType) p.byType[e.questionType]++;
    if (e.range) p.byRange[e.range]++;
    const fid = e.formatId || "unknown";

      count: 0,
      label: e.formatLabel || fid

    p.byFormat[fid].count++;
  }
  p.formatRanking = Object.entries(p.byFormat).map(([id, v]) => ({
    formatId: id,

  })).sort((a, b) => b.count - a.count);

}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];

    used = new Set();

    const rc = Math.floor(count * 0.4);
    const wf = patterns.formatRanking.slice(0, 3).map(f => f.formatId);
    let wp = shuffle(avail.filter(q => wf.includes(q.formatId)));
    for (let i = 0; i < Math.min(rc, wp.length); i++) {
      if (!used.has(wp[i].id)) {
        qs.push({
          ...wp[i],
          isReinforcement: true
        });
        used.add(wp[i].id);
      }
    }
  }
  const gen = shuffle(avail.filter(q => !used.has(q.id)));
  const byF = {};
  for (const q of gen) {
    if (!byF[q.formatId]) byF[q.formatId] = [];
    byF[q.formatId].push(q);
  }
  const fids = shuffle(Object.keys(byF));
  let idx = 0;
  while (qs.length < count && idx < count * 5) {
    const fid = fids[idx % fids.length];
    const fq = byF[fid];
    if (fq && fq.length > 0) {
      const q = fq.shift();
      if (!used.has(q.id)) {
        qs.push(q);
        used.add(q.id);
      }
    }
    idx++;

  const final = shuffle(qs).slice(0, count);
  final.forEach((q, i) => {
    q.index = i + 1;
  });
  return final;
}
