const DB = "https://number-neighbours-default-rtdb.firebaseio.com";
async function dbGet(p) {
  const r = await fetch(`${DB}/${p}.json`);
  return r.json();
}
async function dbSet(p, d) {
  await fetch(`${DB}/${p}.json`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(d)
  });
}
async function dbPush(p, d) {
  const r = await fetch(`${DB}/${p}.json`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(d)
  });
  return r.json();
}
async function dbUpdate(p, d) {
  await fetch(`${DB}/${p}.json`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(d)
  });

async function getUsers() {
  const d = await dbGet("users");
  if (!d) return [];
  return Object.entries(d).map(([id, v]) => ({
    id,
    ...v
  }));
}
async function createUser(name) {
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-");
  const avatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
  const data = {
    name,
    avatar,
    createdAt: new Date().toISOString(),
    totalQuizzes: 0,
    totalQuestions: 0,
    totalCorrect: 0
  };
  await dbSet(`users/${id}`, data);

    id,
    ...data
  };
}
async function getUserStats(uid) {
  return dbGet(`users/${uid}`);
}
async function saveQuiz(uid, qd) {
  const res = await dbPush(`users/${uid}/quizzes`, {
    ...qd,
    timestamp: new Date().toISOString()
  });
  const s = await getUserStats(uid);
  if (s) await dbUpdate(`users/${uid}`, {
    totalQuizzes: (s.totalQuizzes || 0) + 1,
    totalQuestions: (s.totalQuestions || 0) + qd.total,
    totalCorrect: (s.totalCorrect || 0) + qd.correct

}
async function saveErrors(uid, qid, errors) {
  for (const e of errors) await dbPush(`users/${uid}/errors`, {
    ...e,
    quizId: qid,
    timestamp: new Date().toISOString()
  });
}
async function getAllErrors(uid) {
  const d = await dbGet(`users/${uid}/errors`);
  if (!d) return [];

    id,
    ...v
  })).sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
}
async function getErrorPatterns(uid) {
  const errors = await getAllErrors(uid);
  const p = {
    total: errors.length,
    byFormat: {},
    formatRanking: [],
    recentErrors: errors.slice(0, 30)
  };
  for (const e of errors) {
    const fid = e.formatId || "unknown";
    if (!p.byFormat[fid]) p.byFormat[fid] = {
      count: 0,
      label: e.formatLabel || fid
    };
    p.byFormat[fid].count++;
  }
  p.formatRanking = Object.entries(p.byFormat).map(([id, v]) => ({
    formatId: id,
    ...v
  })).sort((a, b) => b.count - a.count);
  return p;
}
